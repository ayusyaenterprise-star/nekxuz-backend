services:
  - type: web
    name: nekxuz-backend
    runtime: node
    plan: free
    nodeVersion: 20
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: NODE_VERSION
        value: "20"

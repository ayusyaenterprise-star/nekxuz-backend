services:services:

  - type: web  - type: web

    name: nekxuz-backend    name: nekxuz-backend

    env: node    env: node

    plan: free    plan: free

    dir: backend-deploy    rootDir: backend-deploy

    buildCommand: npm install --legacy-peer-deps    buildCommand: rm -rf node_modules package-lock.json && npm install --legacy-peer-deps

    startCommand: npm start    startCommand: node server.js

    envVars:    envVars:

      - key: NODE_ENV      - key: NODE_ENV

        value: production        value: production

      - key: FORCE_REBUILD
        value: "true"
